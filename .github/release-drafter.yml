# Release Drafter Configuration for Octoscript
# Docs: https://github.com/release-drafter/release-drafter

# Template untuk nama rilis dan tag
name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Memaksa 2-digit versioning ($Major.$Minor)
# RESOLVED_VERSION akan mengikuti format ini
version-template: '$MAJOR.$MINOR'

# Kategori perubahan berdasarkan label Pull Request
categories:
  - title: '🚀 Fitur Baru'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Perbaikan'
    labels:
      - 'fix'
      - 'bug'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'dependencies'

# Logika penentuan versi berikutnya
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'feature'
      - 'fix'
      - 'patch'
      - 'minor'
      - 'enhancement'
  default: 'minor'

# Descriptive & Automated Release Template for Octoscript
template: |
  ## 📑 Release Summary
  This release transitions the system from `$PREVIOUS_TAG` to `$NEXT_TAG`. It includes all verified changes merged into the main branch.

  $CHANGES

  ---
  ## 🛠 Technical Overview
  - **Target Version**: `$NEXT_TAG`
  - **Previous Stable**: `$PREVIOUS_TAG`
  - **Deployment Status**: 🚀 Ready for Production
  - **Environment**: VPS Standard

  ## 👥 Technical Contributors
  Special thanks to the engineers who contributed to this iteration:
  $CONTRIBUTORS

  ---
  > [!NOTE]
  > This changelog was automatically generated by **Octoscript Bot**. 
  > For a granular view of code changes, see the [Full Comparison](https://github.com/$REPOSITORY/compare/$PREVIOUS_TAG...$NEXT_TAG).
